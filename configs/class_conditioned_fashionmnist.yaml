# Class-conditioned diffusion on Fashion-MNIST (10 classes, 32x32, grayscale).
# Full run — intended for a Colab/Kaggle GPU. Expect ~30-60 min on a T4.
task: class_conditioned
name: class_cond_fashionmnist

model:
  sample_size: 32
  in_channels: 1
  out_channels: 1
  layers_per_block: 2
  norm_num_groups: 32
  block_out_channels: [64, 128, 128, 256]
  down_block_types: [DownBlock2D, DownBlock2D, AttnDownBlock2D, DownBlock2D]
  up_block_types: [UpBlock2D, AttnUpBlock2D, UpBlock2D, UpBlock2D]
  num_classes: 10

scheduler:
  num_train_timesteps: 1000
  beta_schedule: linear
  prediction_type: epsilon

data:
  dataset: zalando-datasets/fashion_mnist
  split: train
  image_column: image
  label_column: label
  resolution: 32
  center_crop: true
  random_flip: false

train:
  output_dir: outputs/class_cond_fashionmnist
  epochs: 30
  batch_size: 128
  learning_rate: 0.0001
  lr_warmup_steps: 500
  mixed_precision: fp16
  use_ema: true
  sample_every_epochs: 2
  save_every_epochs: 10
  num_eval_samples: 20
  num_inference_steps: 50
  seed: 0

hub:
  push_to_hub: false
  repo_id: null
