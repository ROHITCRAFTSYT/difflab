# Smoke variant: tiny model, a handful of samples, 2 optimizer steps.
# Runs in seconds on CPU. Proves the full training/sampling path, NOT quality.
task: class_conditioned
name: class_cond_smoke

model:
  sample_size: 16
  in_channels: 1
  out_channels: 1
  layers_per_block: 1
  norm_num_groups: 8
  block_out_channels: [16, 32]
  down_block_types: [DownBlock2D, DownBlock2D]
  up_block_types: [UpBlock2D, UpBlock2D]
  num_classes: 10

scheduler:
  num_train_timesteps: 50

data:
  dataset: zalando-datasets/fashion_mnist
  split: train
  image_column: image
  label_column: label
  resolution: 16
  max_samples: 32

train:
  output_dir: outputs/class_cond_smoke
  epochs: 1
  max_steps: 2
  batch_size: 8
  lr_warmup_steps: 0
  sample_every_epochs: 1
  save_every_epochs: 1
  num_eval_samples: 4
  num_inference_steps: 4
  seed: 0
