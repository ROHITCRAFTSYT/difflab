# Smoke variant: tiny 32x32 mel, 2 steps. Proves the audio training path on CPU.
task: audio
name: audio_smoke

model:
  sample_size: 32
  in_channels: 1
  out_channels: 1
  layers_per_block: 1
  norm_num_groups: 8
  block_out_channels: [16, 32]
  down_block_types: [DownBlock2D, DownBlock2D]
  up_block_types: [UpBlock2D, UpBlock2D]
  num_classes: 0

scheduler:
  num_train_timesteps: 50

data:
  dataset: lewtun/music_genres_small
  split: train
  audio_column: audio
  sample_rate: 22050
  n_fft: 1024
  hop_length: 256
  n_mels: 32
  max_samples: 8
  streaming: true   # pull 8 clips without downloading the whole dataset

train:
  output_dir: outputs/audio_smoke
  epochs: 1
  max_steps: 2
  batch_size: 4
  lr_warmup_steps: 0
  sample_every_epochs: 1
  save_every_epochs: 1
  num_eval_samples: 4
  num_inference_steps: 4
  seed: 0
