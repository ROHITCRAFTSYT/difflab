# Fine-tune a pretrained 32x32 DDPM on the Smithsonian butterflies subset.
# Full run — intended for a Colab/Kaggle GPU.
task: finetune
name: finetune_butterflies

model:
  # A small pretrained unconditional DDPM UNet. sample_size/channels are
  # overridden from the loaded checkpoint at runtime.
  pretrained: google/ddpm-cifar10-32

scheduler:
  num_train_timesteps: 1000
  beta_schedule: linear
  prediction_type: epsilon

data:
  dataset: huggan/smithsonian_butterflies_subset
  split: train
  image_column: image
  label_column: null
  resolution: 32
  center_crop: true
  random_flip: true

train:
  output_dir: outputs/finetune_butterflies
  epochs: 50
  batch_size: 64
  learning_rate: 0.00005
  lr_warmup_steps: 200
  mixed_precision: fp16
  use_ema: true
  sample_every_epochs: 5
  save_every_epochs: 10
  num_eval_samples: 16
  num_inference_steps: 50
  seed: 0

hub:
  push_to_hub: false
  repo_id: null
