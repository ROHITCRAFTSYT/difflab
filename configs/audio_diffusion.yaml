# Audio diffusion over 128x128 Mel spectrograms. Full run — Colab/Kaggle GPU.
# Each sample is a ~3s slice (hop_length * 128 samples) at 22.05 kHz.
task: audio
name: audio_diffusion

model:
  sample_size: 128
  in_channels: 1
  out_channels: 1
  layers_per_block: 2
  norm_num_groups: 32
  block_out_channels: [64, 128, 256, 256, 512]
  down_block_types: [DownBlock2D, DownBlock2D, DownBlock2D, AttnDownBlock2D, DownBlock2D]
  up_block_types: [UpBlock2D, AttnUpBlock2D, UpBlock2D, UpBlock2D, UpBlock2D]
  num_classes: 0

scheduler:
  num_train_timesteps: 1000
  beta_schedule: linear
  prediction_type: epsilon

data:
  dataset: lewtun/music_genres_small
  split: train
  audio_column: audio
  sample_rate: 22050
  n_fft: 2048
  hop_length: 512
  n_mels: 128

train:
  output_dir: outputs/audio_diffusion
  epochs: 100
  batch_size: 16
  learning_rate: 0.0001
  lr_warmup_steps: 500
  mixed_precision: fp16
  use_ema: true
  sample_every_epochs: 5
  save_every_epochs: 20
  num_eval_samples: 8
  num_inference_steps: 50
  seed: 0

hub:
  push_to_hub: false
  repo_id: null
